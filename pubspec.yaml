name: allosante_benin
description: "AlloSanté Bénin - Plateforme de prise de rendez-vous médicaux avec architecture Offline-First"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: 6.1.5+1
  
  # Local Storage (Offline-First)
  hive: 2.2.3
  hive_flutter: 1.1.0
  
  # Secure Storage for JWT tokens
  flutter_secure_storage: 9.2.3
  
  # HTTP Client
  dio: 5.8.0+1
  
  # Connectivity Detection
  connectivity_plus: 6.1.3
  internet_connection_checker: 3.0.1
  
  # Navigation
  go_router: 14.8.1
  
  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: 6.2.1
  shimmer: 3.0.0
  cached_network_image: 3.4.1
  flutter_svg: 2.0.17
  
  # QR Code (for medical file sharing)
  qr_flutter: 4.1.0
  
  # Utilities
  uuid: 4.5.1
  intl: 0.20.2
  equatable: 2.0.7
  dartz: 0.10.1
  
  # Form validation
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.1.2
  
  # Pin Input for OTP
  pinput: 5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
